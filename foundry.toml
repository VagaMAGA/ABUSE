[profile.default]
src = "contracts/src"
script = "contracts/script"
test = "contracts/test"
out = "contracts/out"
libs = ["lib"]
solc = "0.8.24"
# Match Remix deploy (optimizer was OFF in Remix)
optimizer = false

[rpc_endpoints]
base = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"

[profile.remix]
src = "contracts/remix"
out = "contracts/out-remix"
libs = ["lib"]
solc = "0.8.24"
optimizer = false

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
